<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トルコ語・アラビア語・ペルシア語・モンゴル語 単語クイズ</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🌍 トルコ語・アラビア語・ペルシア語・モンゴル語 単語ゲーム</h1>

    <div class="language-selectors" aria-label="出題言語と表示順">
        <label>
            <span>第1言語</span>
            <select id="firstLanguage">
                <option value="turkish">🇹🇷 トルコ語</option>
                <option value="arabic">🇸🇦 アラビア語</option>
                <option value="persian">🇮🇷 ペルシア語</option>
                <option value="mongolian">🇲🇳 モンゴル語</option>
            </select>
        </label>

        <label>
            <span>第2言語</span>
            <select id="secondLanguage">
                <option value="turkish">🇹🇷 トルコ語</option>
                <option value="arabic" selected>🇸🇦 アラビア語</option>
                <option value="persian">🇮🇷 ペルシア語</option>
                <option value="mongolian">🇲🇳 モンゴル語</option>
            </select>
        </label>
    </div>

    <div class="topbar">

        <button id="restart" type="button">
            リセット
        </button>

    </div>

    <div class="score">

        <div>問題 <span id="questionNumber">1</span></div>

        <div>正解 <span id="correctCount">0</span></div>

        <div>正答率 <span id="accuracy">0%</span></div>

    </div>

    <div class="card">

        <div id="languageLabel">
            トルコ語
        </div>

        <div id="word">
            kelime
        </div>

    </div>

    <div id="choices">

        <button class="choice" type="button"></button>
        <button class="choice" type="button"></button>
        <button class="choice" type="button"></button>
        <button class="choice" type="button"></button>

    </div>

    <div id="result" role="status" aria-live="polite"></div>

    <section id="examples" hidden aria-live="polite">
        <h2>例文</h2>
        <div id="exampleList"></div>
    </section>

    <button id="nextButton" type="button">
        次の問題
    </button>

</div>

<script src="words.js"></script>
<script src="script.js"></script>

</body>
</html>
